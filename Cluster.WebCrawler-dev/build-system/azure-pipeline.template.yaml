parameters:
  name: ''
  displayName: ''
  vmImage: ''
  publishContainers: false
  timeoutInMinutes: 120

jobs:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.displayName }}
    timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
    pool:
      vmImage: ${{ parameters.vmImage }}
    steps:
      - checkout: self
        clean: false
        submodules: recursive
        persistCredentials: true
      
      - task: UseDotNet@2
        displayName: 'Install .NET SDK from global.json'
        inputs:
          useGlobalJson: true
      
      # Build solution
      - task: DotNetCoreCLI@2
        displayName: 'Build solution'
        inputs:
          command: build
          projects: '**/*.sln'
          arguments: '--configuration Release'
      
      # Run tests
      - task: DotNetCoreCLI@2
        displayName: 'Run tests'
        inputs:
          command: test
          projects: '**/*.sln'
          arguments: '--configuration Release --no-build --collect:"XPlat Code Coverage"'
          publishTestResults: true
      
      # Publish containers if specified
      - ${{ if eq(parameters.publishContainers, true) }}:
        - task: Bash@3
          displayName: 'Validate Docker Compose deployment'
          inputs:
            targetType: 'inline'
            script:
              dotnet publish --configuration Release /t:PublishContainer

        # Install Petabridge.Cmd tool
        - task: DotNetCoreCLI@2
          displayName: 'Install Petabridge.Cmd tool'
          inputs:
            command: custom
            custom: tool
            arguments: 'install --global pbm'

        # Start Docker Compose and validate cluster
        - task: Bash@3
          displayName: 'Validate Docker Compose deployment'
          inputs:
            targetType: 'inline'
            script: |
              # Start Docker Compose
              docker compose -f docker/docker-compose.yml up -d

              # Wait for web service to be running (max 30 seconds)
              timeout=30
              elapsed=0
              until [ "$(docker inspect --format='{{.State.Status}}' $(docker ps -q -f name=webcrawler.web))" == "running" ] || [ $elapsed -ge $timeout ]; do
                sleep 1
                elapsed=$((elapsed + 1))
              done

              if [ $elapsed -ge $timeout ]; then
                echo "Timeout waiting for services to start"
                docker compose -f docker/docker-compose.yml logs
                docker compose -f docker/docker-compose.yml down
                exit 1
              fi

              # Give the services a moment to initialize
              sleep 10

              # Try pbm cluster show up to 5 times
              max_attempts=5
              attempt=1
              success=false

              while [ $attempt -le $max_attempts ] && [ "$success" = false ]; do
                echo "Attempt $attempt of $max_attempts to verify cluster status..."
                if pbm 127.0.0.1:9110 cluster show; then
                  success=true
                else
                  sleep 5
                  attempt=$((attempt + 1))
                fi
              done

              # Clean up containers
              docker compose -f docker/docker-compose.yml down

              # Exit with failure if pbm checks didn't succeed
              if [ "$success" = false ]; then
                echo "Failed to verify cluster status after $max_attempts attempts"
                exit 1
              fi
