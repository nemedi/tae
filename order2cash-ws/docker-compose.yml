      SUPPLIER_ENDPOINT: http://supplier:8080/supplier
      INVENTORY_ENDPOINT: http://inventory:8080/inventory
      LOGISTICS_ENDPOINT: http://logistics:8080/logistics
      BANK_ENDPOINT: http://bank:8080/bank
    ports:
      - "8580:8080"
    volumes:
      - ./data:/order2cash/data
    networks:
      - order2cash-net
    restart: on-failure

networks:
  order2cash-net:
    driver: bridge
