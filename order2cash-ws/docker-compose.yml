      INVENTORY_ENDPOINT: http://inventory:8080/inventory
      LOGISTICS_ENDPOINT: http://logistics:8080/logistics
      BANK_ENDPOINT: http://bank:8080/bank
    ports:
      - "8480:8080"
    volumes:
      - ./data:/order2cash/data
    networks:
      - order2cash-net
    restart: on-failure

  order2cash_ws_bank:
    build: .
    image: order2cash-ws:latest
    container_name: order2cash_ws_bank
    hostname: bank
