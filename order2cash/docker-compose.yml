version: '3.8'

x-app-common: &app-common
  build: .
  depends_on:
    kafka1:
      condition: service_healthy
    kafka2:
      condition: service_healthy
  volumes:
    - ./data:/data
  restart: on-failure:3

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka1
    container_name: kafka1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 15

  kafka2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka2
    container_name: kafka2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 15

  buyer:
    <<: *app-common
    container_name: buyer
    environment:
      SPRING_PROFILES_ACTIVE: buyer
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka1:29092
      LOGGING_LEVEL_COM_EXAMPLE_ORDER2CASH: INFO
      APP_DATA_PATH: /data

  supplier:
    <<: *app-common
    container_name: supplier
    environment:
      SPRING_PROFILES_ACTIVE: supplier
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka1:29092
      LOGGING_LEVEL_COM_EXAMPLE_ORDER2CASH: INFO
      APP_DATA_PATH: /data

  inventory:
    <<: *app-common
    container_name: inventory
    environment:
      SPRING_PROFILES_ACTIVE: inventory
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka2:29093
      LOGGING_LEVEL_COM_EXAMPLE_ORDER2CASH: INFO
      APP_DATA_PATH: /data

  logistics:
    <<: *app-common
    container_name: logistics
    environment:
      SPRING_PROFILES_ACTIVE: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka2:29093
      LOGGING_LEVEL_COM_EXAMPLE_ORDER2CASH: INFO
      APP_DATA_PATH: /data

  bank:
    <<: *app-common
    container_name: bank
    environment:
      SPRING_PROFILES_ACTIVE: bank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka2:29093
      LOGGING_LEVEL_COM_EXAMPLE_ORDER2CASH: INFO
      APP_DATA_PATH: /data
