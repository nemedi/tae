akka {
  actor {
    provider = "remote"

    # Java serialization used for the XML message types
    allow-java-serialization = on
    warn-about-java-serializer-usage = false

    serialization-bindings {
      "com.example.order2cash.akka.messages.PurchaseOrderFileDetected"       = java
      "com.example.order2cash.akka.messages.PurchaseOrder"                   = java
      "com.example.order2cash.akka.messages.InventoryRequest"                = java
      "com.example.order2cash.akka.messages.InventoryResponse"               = java
      "com.example.order2cash.akka.messages.ShipmentRequest"                 = java
      "com.example.order2cash.akka.messages.ShipmentNotification"            = java
      "com.example.order2cash.akka.messages.Invoice"                         = java
      "com.example.order2cash.akka.messages.PaymentInstruction"              = java
      "com.example.order2cash.akka.messages.PaymentConfirmation"             = java
    }
  }

  remote {
    artery {
      transport = tcp
      canonical.hostname = "127.0.0.1"
      canonical.hostname = ${?AKKA_HOSTNAME}
      canonical.port = 2551
      canonical.port = ${?AKKA_PORT}
    }
  }

  loglevel = "INFO"
  stdout-loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = on
}

order2cash {
  buyer {
    data-path = "data"
    data-path = ${?DATA_PATH}
  }
  supplier {
    data-path = "data"
    data-path = ${?DATA_PATH}
  }
  inventory {
    data-path = "data"
    data-path = ${?DATA_PATH}
  }
  logistics {
    data-path = "data"
    data-path = ${?DATA_PATH}
  }
  bank {
    data-path = "data"
    data-path = ${?DATA_PATH}
  }
}
